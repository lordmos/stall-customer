<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>摆摊小助手</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- 顶部导航 -->
  <nav class="nav">
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="nav-title">🛍️ 摆摊小助手</span>
      <button class="notice-btn" id="noticeBtn" aria-label="购物须知">购物须知</button>
    </div>
    <a href="cart.html" class="nav-cart-btn" id="cartBtn" aria-label="购物车">
      🛒
      <span class="cart-badge hidden" id="cartBadge"></span>
    </a>
  </nav>

  <!-- 购物须知弹窗 -->
  <div class="modal-overlay hidden" id="noticeModal">
    <div class="modal-sheet">
      <div class="modal-title">📋 购物须知</div>
      <div class="notice-section-title">🪜 购买流程</div>
      <ol class="notice-steps">
        <li>排队等候时，提前在此页面<strong>选好商品</strong>加入购物车</li>
        <li>点击「生成核销码」，系统实时核查库存并生成二维码</li>
        <li>轮到您时，将<strong>二维码出示给商家</strong>扫描核销</li>
        <li>商家确认商品数量后，完成<strong>付款</strong>即可</li>
      </ol>
      <div class="notice-section-title">⚠️ 注意事项</div>
      <ul class="notice-list">
        <li><span class="ni">🔄</span><span>商品库存<strong>实时变动</strong>，页面显示数量仅供参考</span></li>
        <li><span class="ni">✅</span><span>点击「生成核销码」时，系统会<strong>自动拉取最新库存</strong></span></li>
        <li><span class="ni">⚠️</span><span>若购物车中有商品已<strong>售罄</strong>，会逐一提示，请移除后重试</span></li>
        <li><span class="ni">⚡</span><span>建议尽快完成核销，热门商品可能很快售罄</span></li>
      </ul>
      <button class="modal-close-btn" id="noticeCloseBtn">知道了</button>
    </div>
  </div>

  <!-- 商品列表 -->
  <main class="main-layout">
    <!-- 左侧分类栏 -->
    <nav class="cat-sidebar" id="catSidebar" aria-label="商品分类"></nav>

    <!-- 右侧商品区 -->
    <div class="main-content" id="mainContent">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>加载商品中…</div>
      </div>
      <div id="error" class="empty" style="display:none;"></div>
      <div id="productList" class="product-list" style="display:none;"></div>
      <div id="empty" class="empty" style="display:none;">暂无在售商品</div>
    </div>
  </main>

  <!-- 大图预览 -->
  <div class="lightbox hidden" id="lightbox">
    <img id="lightboxImg" src="" alt="" />
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script>
    // ── 购物须知弹窗 ────────────────────────────────────────────
    document.getElementById('noticeBtn').addEventListener('click', () => {
      document.getElementById('noticeModal').classList.remove('hidden');
    });
    document.getElementById('noticeCloseBtn').addEventListener('click', () => {
      document.getElementById('noticeModal').classList.add('hidden');
    });
    document.getElementById('noticeModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
    });

    // ── 大图预览 ─────────────────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    let _lightboxOpenAt = 0;

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt;
      lightbox.classList.remove('hidden');
      _lightboxOpenAt = Date.now();
    }
    // 防止 iOS ghost-click：开启后 350ms 内忽略关闭事件
    lightbox.addEventListener('click', () => {
      if (Date.now() - _lightboxOpenAt > 350) {
        lightbox.classList.add('hidden');
      }
    });
  </script>
  <script>
    // ── 分类逻辑 ─────────────────────────────────────────────────
    const CATEGORIES = ['本子', '制品', '无料'];
    const CATEGORY_ICONS = { '本子': '📔', '制品': '🎁', '无料': '🎀' };

    function getCategory(name) {
      if (name.includes('无料')) return '无料';
      if (name.includes('《') || name.includes('》')) return '本子';
      return '制品';
    }

    // ── 工具函数 ─────────────────────────────────────────────────
    function renderPrice(cents) {
      return '¥' + (cents / 100).toFixed(2);
    }

    function buildThumb(product) {
      if (product.imageUrl) {
        const img = document.createElement('img');
        img.className = 'product-thumb';
        img.src = product.imageUrl;
        img.alt = product.name;
        img.loading = 'lazy';
        img.style.cursor = 'zoom-in';
        img.onerror = () => img.replaceWith(buildThumbPlaceholder());
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          openLightbox(product.imageUrl, product.name);
        });
        return img;
      }
      return buildThumbPlaceholder();
    }

    function buildThumbPlaceholder() {
      const d = document.createElement('div');
      d.className = 'product-thumb-placeholder';
      d.textContent = '🖼';
      return d;
    }

    function buildQtyControl(product, qty) {
      const wrap = document.createElement('div');
      wrap.className = 'qty-control';

      const minus = document.createElement('button');
      minus.className = 'qty-btn';
      minus.textContent = '−';
      minus.addEventListener('click', (e) => {
        e.stopPropagation();
        Cart.add(product, -1);
        refreshCard(product);
        updateBadge();
      });

      const num = document.createElement('span');
      num.className = 'qty-num';
      num.textContent = qty;

      const plus = document.createElement('button');
      plus.className = 'qty-btn';
      plus.textContent = '+';
      plus.disabled = qty >= product.stock;
      plus.addEventListener('click', (e) => {
        e.stopPropagation();
        Cart.add(product, 1);
        refreshCard(product);
        updateBadge();
      });

      wrap.append(minus, num, plus);
      return wrap;
    }

    function buildCard(product, cartQty) {
      const isSoldOut = product.stock === 0;
      const card = document.createElement('div');
      card.className = 'product-card';
      card.dataset.id = product.id;

      // 缩略图（点击缩略图打开大图，在 buildThumb 内绑定）
      card.appendChild(buildThumb(product));

      // 右侧内容
      const body = document.createElement('div');
      body.className = 'product-body';

      const name = document.createElement('div');
      name.className = 'product-name';
      name.textContent = product.name;
      body.appendChild(name);

      if (product.description) {
        const desc = document.createElement('div');
        desc.className = 'product-desc';
        desc.textContent = product.description;
        body.appendChild(desc);
      }

      // 底部：价格 + 操作
      const footer = document.createElement('div');
      footer.className = 'product-footer';

      const priceCol = document.createElement('div');
      priceCol.className = 'product-price-col';

      const price = document.createElement('div');
      price.className = 'product-price';
      price.textContent = renderPrice(product.price);
      priceCol.appendChild(price);

      if (isSoldOut) {
        const soldout = document.createElement('div');
        soldout.className = 'soldout-label';
        soldout.textContent = '已售罄';
        priceCol.appendChild(soldout);
        footer.appendChild(priceCol);

        const btn = document.createElement('button');
        btn.className = 'add-btn';
        btn.disabled = true;
        btn.textContent = '已售罄';
        btn.addEventListener('click', (e) => e.stopPropagation());
        footer.appendChild(btn);
      } else if (cartQty > 0) {
        const remaining = product.stock - cartQty;
        const stockEl = document.createElement('div');
        stockEl.className = 'product-stock';
        stockEl.textContent = `库存余 ${remaining}`;
        priceCol.appendChild(stockEl);
        footer.appendChild(priceCol);
        footer.appendChild(buildQtyControl(product, cartQty));
      } else {
        const stockEl = document.createElement('div');
        stockEl.className = 'product-stock';
        stockEl.textContent = `库存 ${product.stock}`;
        priceCol.appendChild(stockEl);
        footer.appendChild(priceCol);

        const btn = document.createElement('button');
        btn.className = 'add-btn';
        btn.textContent = '加购';
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          Cart.add(product, 1);
          refreshCard(product);
          updateBadge();
        });
        footer.appendChild(btn);
      }

      body.appendChild(footer);
      card.appendChild(body);
      return card;
    }

    // 局部刷新单张卡片
    function refreshCard(product) {
      const cart = Cart.get();
      const qty = cart[product.id]?.qty ?? 0;
      const list = document.getElementById('productList');
      const old = list.querySelector(`[data-id="${product.id}"]`);
      if (old) old.replaceWith(buildCard(product, qty));
    }

    function updateBadge() {
      const cart = Cart.get();
      const count = Cart.count(cart);
      const badge = document.getElementById('cartBadge');
      if (count > 0) {
        badge.textContent = count > 99 ? '99+' : count;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }

    // ── 初始化 ──────────────────────────────────────────────────────
    async function init() {
      try {
        const data = await Api.getProducts();
        const products = data.products || [];
        document.getElementById('loading').style.display = 'none';

        if (products.length === 0) {
          document.getElementById('empty').style.display = 'block';
          return;
        }

        // 分类 + 类内按 updatedAt 升序排列
        const groups = { '本子': [], '制品': [], '无料': [] };
        products.forEach(p => groups[getCategory(p.name)].push(p));
        CATEGORIES.forEach(cat => {
          groups[cat].sort((a, b) => {
            const ta = a.updatedAt ? new Date(a.updatedAt).getTime() : 0;
            const tb = b.updatedAt ? new Date(b.updatedAt).getTime() : 0;
            return ta - tb;
          });
        });

        const cart = Cart.get();
        const list = document.getElementById('productList');
        const sidebar = document.getElementById('catSidebar');
        const content = document.getElementById('mainContent');
        const activeCats = CATEGORIES.filter(c => groups[c].length > 0);

        // 渲染左侧分类栏
        activeCats.forEach((cat, i) => {
          const tab = document.createElement('div');
          tab.className = 'cat-tab' + (i === 0 ? ' active' : '');
          tab.dataset.cat = cat;
          tab.innerHTML = `<span class="cat-tab-icon">${CATEGORY_ICONS[cat]}</span><span>${cat}</span>`;
          tab.addEventListener('click', () => scrollToCategory(cat));
          sidebar.appendChild(tab);
        });

        // 渲染右侧商品区
        activeCats.forEach(cat => {
          const section = document.createElement('div');
          section.className = 'category-section';
          section.dataset.cat = cat;

          const header = document.createElement('div');
          header.className = 'category-header';
          header.textContent = `${CATEGORY_ICONS[cat]} ${cat}`;
          section.appendChild(header);

          groups[cat].forEach(p => {
            const qty = cart[p.id]?.qty ?? 0;
            section.appendChild(buildCard(p, qty));
          });

          list.appendChild(section);
        });

        list.style.display = 'block';
        updateBadge();

        // 点击分类跳转
        function scrollToCategory(cat) {
          const target = list.querySelector(`.category-section[data-cat="${cat}"]`);
          if (target) {
            content.scrollTo({ top: target.offsetTop, behavior: 'smooth' });
          }
          setActiveTab(cat);
        }

        function setActiveTab(cat) {
          sidebar.querySelectorAll('.cat-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.cat === cat);
          });
        }

        // 滚动时自动高亮对应分类
        const sections = () => list.querySelectorAll('.category-section[data-cat]');
        content.addEventListener('scroll', () => {
          const scrollTop = content.scrollTop;
          let current = activeCats[0];
          sections().forEach(sec => {
            if (sec.offsetTop <= scrollTop + 60) current = sec.dataset.cat;
          });
          setActiveTab(current);
          // 让对应 tab 滚入视野
          const activeTab = sidebar.querySelector(`.cat-tab[data-cat="${current}"]`);
          if (activeTab) {
            activeTab.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }
        }, { passive: true });
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        const errEl = document.getElementById('error');
        errEl.textContent = '加载失败，请刷新重试：' + (err.message || '网络错误');
        errEl.style.display = 'block';
      }
    }

    init();
  </script>
</body>

</html>
